{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-info text-white">
                    <h3 class="text-center mb-0">Alterar Senha</h3>
                </div>
                <div class="card-body">
                    {% if erro %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        {{ erro }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endif %}
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label for="senha_atual" class="form-label">Senha Atual:</label>
                            <input type="password" class="form-control" name="senha_atual" id="senha_atual" required>
                        </div>
                        <div class="mb-3">
                            <label for="nova_senha" class="form-label">Nova Senha (mínimo 6 caracteres):</label>
                            <input type="password" class="form-control" name="nova_senha" id="nova_senha" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label for="confirmar_senha" class="form-label">Confirmar Nova Senha:</label>
                            <input type="password" class="form-control" name="confirmar_senha" id="confirmar_senha" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Alterar Senha</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
